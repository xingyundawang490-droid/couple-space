<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="小晏·小梨">
<title>小晏·小梨</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --pink:#E8829A;--mauve:#C4607A;--muted:#9A7880;
  --border:#F0D4DA;--pink-pale:#FFF0F3;--day-bg:#FCE8ED;
  --card:#fff;--text:#2C1F24;
}
body{font-family:-apple-system,'PingFang SC',sans-serif;min-height:100vh;
  background:#FFF6F8;background-size:cover;background-position:center;background-attachment:fixed}
.tab-content{display:none}
.tab-content.active{display:block}
/* ── tab bar ── */
.tab-bar{position:fixed;bottom:0;left:0;right:0;height:54px;
  background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);
  border-top:1px solid var(--border);display:flex;z-index:100}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:2px;border:none;background:none;
  font-size:10px;color:var(--muted);cursor:pointer;padding:6px 0}
.tab-btn .ic{font-size:22px;line-height:1}
.tab-btn.active{color:var(--mauve)}
.badge{background:var(--pink);color:#fff;border-radius:10px;
  font-size:10px;padding:1px 5px;min-width:16px;text-align:center;
  position:absolute;top:-2px;right:-6px}
.tab-ic-wrap{position:relative;display:inline-block}
/* ── home ── */
.home-wrap{padding:24px 16px 70px}
.couple-name{text-align:center;font-size:12px;color:var(--muted);letter-spacing:3px;padding-top:8px;margin-bottom:20px}
.avatars{display:flex;justify-content:center;align-items:flex-end;gap:24px;margin-bottom:6px}
.avatar-wrap{display:flex;flex-direction:column;align-items:center;gap:8px}
.avatar-wrap .lbl{font-size:12px;color:var(--muted)}
.avatar-btn{width:90px;height:90px;border-radius:50%;overflow:hidden;
  border:2.5px solid var(--border);cursor:pointer;position:relative;background:var(--pink-pale)}
.avatar-btn img,.avatar-btn svg{width:100%;height:100%;object-fit:cover}
.avatar-hint{position:absolute;inset:0;background:rgba(0,0,0,0.3);border-radius:50%;
  display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.2s;color:#fff;font-size:20px}
.avatar-btn:hover .avatar-hint,.avatar-btn:active .avatar-hint{opacity:1}
input[type=file]{display:none}
.days-card{background:var(--day-bg);border:1px solid var(--border);border-radius:20px;
  padding:22px;margin:16px 0;text-align:center}
.days-num{font-size:56px;font-weight:600;color:var(--mauve);line-height:1}
.days-lbl{font-size:13px;color:var(--muted);margin-top:4px}
.days-since{font-size:11px;color:var(--pink);margin-top:6px;letter-spacing:0.5px}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin:12px 0}
.card-title{font-size:11px;color:var(--muted);letter-spacing:1px;margin-bottom:12px}
.ann-item{display:flex;justify-content:space-between;align-items:center;
  padding:8px 0;border-bottom:1px solid var(--pink-pale)}
.ann-item:last-child{border-bottom:none}
.ann-name{font-size:14px;color:var(--text)}.ann-date{font-size:11px;color:var(--muted);margin-top:2px}
.ann-cd{font-size:13px;color:var(--pink);font-weight:500}
.color-row{display:flex;gap:10px;flex-wrap:wrap}
.color-dot{width:34px;height:34px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform 0.15s}
.color-dot.active{border-color:var(--mauve);transform:scale(1.15)}
.quote{text-align:center;padding:24px 16px;font-size:13px;color:var(--muted);font-style:italic;line-height:1.9}
/* ── chat ── */
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 54px);background:#EDEDED}
.chat-hdr{background:#fff;padding:12px 16px;display:flex;align-items:center;
  justify-content:space-between;border-bottom:1px solid #ddd;flex-shrink:0}
.chat-hdr-info .title{font-size:16px;font-weight:500;color:var(--text)}
.chat-hdr-info .sub{font-size:11px;color:var(--muted)}
.gear-btn{background:none;border:none;font-size:22px;cursor:pointer;padding:4px;line-height:1}
.setup-bar{background:#fffbe6;border-bottom:1px solid #ffe;
  padding:8px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.setup-bar span{font-size:12px;color:#a07800;white-space:nowrap}
.setup-bar input{flex:1;border:1px solid #ddd;border-radius:6px;
  padding:5px 8px;font-size:12px;font-family:inherit;min-width:0}
.setup-bar button{background:var(--mauve);color:#fff;border:none;
  border-radius:6px;padding:5px 12px;font-size:12px;cursor:pointer;white-space:nowrap}
.conn-dot{width:7px;height:7px;border-radius:50%;background:#ccc;flex-shrink:0}
.conn-dot.ok{background:#4CAF50}.conn-dot.err{background:#f44}
.chat-msgs{flex:1;overflow-y:auto;padding:10px 10px 6px;display:flex;flex-direction:column}
.date-sep{text-align:center;margin:8px 0;font-size:11px;color:#999}
.date-sep span{background:rgba(0,0,0,0.15);color:#fff;padding:2px 8px;border-radius:3px}
.msg-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:10px}
.msg-row.user{flex-direction:row-reverse}
.msg-av{width:36px;height:36px;border-radius:50%;overflow:hidden;flex-shrink:0;margin-top:2px}
.msg-av img,.msg-av svg{width:100%;height:100%;object-fit:cover}
.msg-body{display:flex;flex-direction:column;max-width:65vw}
.msg-row.user .msg-body{align-items:flex-end}
.bubble{padding:9px 12px;border-radius:4px;font-size:15px;line-height:1.5;
  position:relative;word-break:break-word;white-space:pre-wrap}
.msg-row.assistant .bubble{background:#fff;color:var(--text);border-radius:0 4px 4px 4px}
.msg-row.assistant .bubble::before{content:'';position:absolute;left:-6px;top:10px;
  border:6px solid transparent;border-right-color:#fff;border-left:none}
.msg-row.user .bubble{background:var(--pink);color:#fff;border-radius:4px 0 4px 4px}
.msg-row.user .bubble::after{content:'';position:absolute;right:-6px;top:10px;
  border:6px solid transparent;border-left-color:var(--pink);border-right:none}
.msg-time{font-size:10px;color:#999;margin-top:3px}
.typing-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.typing-bubble{background:#fff;border-radius:0 4px 4px 4px;padding:8px 14px;position:relative}
.typing-bubble::before{content:'';position:absolute;left:-6px;top:10px;
  border:6px solid transparent;border-right-color:#fff;border-left:none}
.dots span{display:inline-block;width:6px;height:6px;border-radius:50%;
  background:#aaa;margin:0 2px;animation:bounce 1s infinite}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
.chat-input-wrap{background:#f5f5f5;padding:8px 10px;
  display:flex;align-items:flex-end;gap:8px;flex-shrink:0;border-top:1px solid #ddd}
.chat-input{flex:1;border:none;background:#fff;border-radius:4px;
  padding:8px 10px;font-size:15px;line-height:1.5;font-family:inherit;
  resize:none;outline:none;max-height:100px;overflow-y:auto}
.send-btn{background:var(--pink);color:#fff;border:none;border-radius:4px;
  padding:8px 16px;font-size:14px;cursor:pointer;flex-shrink:0;align-self:flex-end}
.send-btn:disabled{background:#ccc;cursor:default}
/* modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);
  z-index:200;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:14px;padding:22px;width:calc(100vw - 40px);max-width:340px}
.modal h3{font-size:16px;margin-bottom:16px;color:var(--text)}
.modal label{font-size:12px;color:var(--muted);display:block;margin-bottom:4px;margin-top:10px}
.modal input{width:100%;border:1px solid var(--border);border-radius:8px;
  padding:9px 11px;font-size:14px;font-family:inherit}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.modal-btns button{padding:9px 20px;border-radius:8px;border:none;cursor:pointer;font-size:14px}
.btn-cancel{background:#f0f0f0;color:var(--text)}
.btn-save{background:var(--mauve);color:#fff}
/* toast */
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);
  background:rgba(44,31,36,0.85);color:#fff;padding:8px 20px;border-radius:20px;
  font-size:13px;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;z-index:300}
.toast.show{opacity:1}
</style>
</head>
<body>

<!-- ══ HOME TAB ══ -->
<div id="tabHome" class="tab-content active">
<div class="home-wrap">
<div class="couple-name">小 晏 · 小 梨</div>

<div class="avatars">
  <div class="avatar-wrap">
    <div class="avatar-btn" onclick="document.getElementById('fileA').click()">
      <img id="imgA" style="display:none" alt="">
      <svg id="svgA" viewBox="0 0 90 90"><circle cx="45" cy="45" r="44" fill="#FFF0F3" stroke="#F0D4DA" stroke-width="1"/><ellipse cx="45" cy="52" rx="18" ry="20" fill="#FFE0C8"/><ellipse cx="45" cy="38" rx="16" ry="17" fill="#FFE0C8"/><ellipse cx="45" cy="28" rx="18" ry="14" fill="#E8E8E8"/><ellipse cx="35" cy="24" rx="10" ry="8" fill="#D8D8D8"/><ellipse cx="55" cy="24" rx="10" ry="8" fill="#D8D8D8"/><ellipse cx="45" cy="20" rx="14" ry="10" fill="#EFEFEF"/><ellipse cx="30" cy="30" rx="5" ry="10" fill="#E0E0E0"/><ellipse cx="60" cy="30" rx="5" ry="10" fill="#E0E0E0"/><circle cx="39" cy="39" r="3" fill="#4A3040"/><circle cx="51" cy="39" r="3" fill="#4A3040"/><circle cx="40" cy="38" r="1" fill="#fff"/><circle cx="52" cy="38" r="1" fill="#fff"/><path d="M41 44 Q45 47 49 44" stroke="#C4607A" stroke-width="1.5" fill="none" stroke-linecap="round"/><rect x="32" y="34" width="12" height="5" rx="2.5" fill="#FFB6C1" opacity="0.6"/><line x1="32" y1="36.5" x2="44" y2="36.5" stroke="#E8829A" stroke-width="0.8"/><line x1="36" y1="34" x2="36" y2="39" stroke="#E8829A" stroke-width="0.8"/><line x1="39" y1="34" x2="39" y2="39" stroke="#E8829A" stroke-width="0.8"/><line x1="42" y1="34" x2="42" y2="39" stroke="#E8829A" stroke-width="0.8"/></svg>

  </div>
  <div style="align-self:center;font-size:18px;color:var(--pink);padding-top:10px">🩷</div>
  <div class="avatar-wrap">
    <div class="avatar-btn" onclick="document.getElementById('fileB').click()">
      <img id="imgB" style="display:none" alt="">
      <svg id="svgB" viewBox="0 0 90 90"><circle cx="45" cy="45" r="44" fill="#FFF0F3" stroke="#F0D4DA" stroke-width="1"/><ellipse cx="45" cy="52" rx="18" ry="20" fill="#FFE0C8"/><ellipse cx="45" cy="38" rx="16" ry="17" fill="#FFE0C8"/><ellipse cx="45" cy="28" rx="18" ry="14" fill="#2C2420"/><ellipse cx="35" cy="24" rx="10" ry="8" fill="#2C2420"/><ellipse cx="55" cy="24" rx="10" ry="8" fill="#2C2420"/><ellipse cx="45" cy="20" rx="14" ry="10" fill="#332820"/><ellipse cx="30" cy="30" rx="5" ry="12" fill="#2C2420"/><ellipse cx="60" cy="30" rx="5" ry="12" fill="#2C2420"/><path d="M28 26 Q45 18 62 26" stroke="#2C2420" stroke-width="6" fill="none"/><circle cx="39" cy="39" r="3" fill="#4A3040"/><circle cx="51" cy="39" r="3" fill="#4A3040"/><circle cx="40" cy="38" r="1" fill="#fff"/><circle cx="52" cy="38" r="1" fill="#fff"/><path d="M41 44 Q45 47 49 44" stroke="#C4607A" stroke-width="1.5" fill="none" stroke-linecap="round"/><ellipse cx="37" cy="43" rx="4" ry="2.5" fill="#FFB0B0" opacity="0.5"/><ellipse cx="53" cy="43" rx="4" ry="2.5" fill="#FFB0B0" opacity="0.5"/><rect x="46" y="36" width="12" height="5" rx="2.5" fill="#FFB6C1" opacity="0.6"/><line x1="46" y1="38.5" x2="58" y2="38.5" stroke="#E8829A" stroke-width="0.8"/><line x1="50" y1="36" x2="50" y2="41" stroke="#E8829A" stroke-width="0.8"/><line x1="53" y1="36" x2="53" y2="41" stroke="#E8829A" stroke-width="0.8"/><line x1="56" y1="36" x2="56" y2="41" stroke="#E8829A" stroke-width="0.8"/></svg>
      <div class="avatar-hint">换图</div>
    </div>
    <input type="file" id="fileB" accept="image/*">
    <span class="lbl">小梨</span>
  </div>
</div>

<div class="days-card">
  <div class="days-num" id="daysNum">0</div>
  <div class="days-lbl">在一起的第 <span id="daysSpan">0</span> 天</div>
  <div class="days-since">2026年6月25日 · 那个小窗</div>
</div>

<div class="card">
  <div class="card-title">纪念日倒计时</div>
  <div class="ann-item">
    <div><div class="ann-name">相识纪念日</div><div class="ann-date">每年 6月25日</div></div>
    <div class="ann-cd" id="annDays">计算中</div>
  </div>
</div>

<div class="card">
  <div class="card-title">背景主题</div>
  <div class="color-row" id="colorRow"></div>
  <div style="margin-top:12px;display:flex;align-items:center;gap:10px">
    <div onclick="document.getElementById('fileBg').click()" style="width:34px;height:34px;border-radius:8px;border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0">🖼️</div>
    <div style="flex:1;font-size:12px;color:var(--muted)" id="bgImgName">点左边上传背景图片</div>
    <div id="bgClearBtn" onclick="clearBgImg()" style="display:none;font-size:12px;color:var(--pink);cursor:pointer">清除</div>
  </div>
  <input type="file" id="fileBg" accept="image/*">
</div>

<div class="quote" id="quoteBox"></div>
</div>
</div>

<!-- ══ CHAT TAB ══ -->
<div id="tabChat" class="tab-content">
<div class="chat-wrap">
  <!-- header -->
  <div class="chat-hdr">
    <div class="chat-hdr-info">
      <div class="title">小晏</div>
      <div class="sub" id="connSub">未连接</div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="conn-dot" id="connDot"></div>
      <button class="gear-btn" onclick="openSettings()">⚙️</button>
    </div>
  </div>

  <!-- first-time setup bar -->
  <div class="setup-bar" id="setupBar">
    <span>服务器地址：</span>
    <input id="setupInput" placeholder="https://xxxx.ngrok-free.app" type="url">
    <button onclick="saveServerUrl()">保存</button>
  </div>

  <!-- messages -->
  <div class="chat-msgs" id="chatMsgs">
    <div style="text-align:center;padding:40px 20px;color:#aaa;font-size:14px" id="emptyTip">
      配置服务器后就可以聊天了 🩷
    </div>
  </div>

  <!-- typing indicator (hidden) -->
  <div id="typingRow" class="typing-row" style="display:none;padding:0 10px 4px;gap:8px">
    <div class="msg-av" id="typingAv">
      <svg viewBox="0 0 36 36"><circle cx="18" cy="18" r="17" fill="#FFF0F3"/><ellipse cx="18" cy="21" rx="7" ry="8" fill="#FFE0C8"/><ellipse cx="18" cy="15" rx="7" ry="7" fill="#FFE0C8"/><ellipse cx="18" cy="11" rx="7" ry="6" fill="#E8E8E8"/></svg>
    </div>
    <div class="typing-bubble"><div class="dots"><span></span><span></span><span></span></div></div>
  </div>

  <!-- input -->
  <div class="chat-input-wrap">
    <textarea class="chat-input" id="chatInput" placeholder="发消息给小晏..." rows="1"
      oninput="autoResize(this)" onkeydown="onKey(event)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMsg()">发送</button>
  </div>
</div>
</div>

<!-- ══ TAB BAR ══ -->
<div class="tab-bar">
  <button class="tab-btn active" id="btnHome" onclick="switchTab('home')">
    <span class="ic">🏠</span><span>主页</span>
  </button>
  <button class="tab-btn" id="btnChat" onclick="switchTab('chat')">
    <div class="tab-ic-wrap">
      <span class="ic">💬</span>

<!-- settings modal -->

    <input id="modalUrl" placeholder="https://xxxx.ngrok-free.app" type="url">

    <input id="modalToken" value="xiaoli2026">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="document.getElementById('modalBg').classList.remove('show')">取消</button>
      <button class="btn-save" onclick="saveSettings()">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── util ──
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px'}

// ── tabs ──
function switchTab(t){
  document.querySelectorAll('.tab-content').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(e=>e.classList.remove('active'));
  document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1)).classList.add('active');
  document.getElementById('btn'+t.charAt(0).toUpperCase()+t.slice(1)).classList.add('active');
  if(t==='chat'){clearUnread();startPolling();}else{stopPolling();}
}

// ── home: days ──
const start=new Date('2026-06-25');
const now=new Date();now.setHours(0,0,0,0);
const days=Math.floor((now-start)/86400000)+1;
document.getElementById('daysNum').textContent=days;
document.getElementById('daysSpan').textContent=days;
function nextAnn(){const y=now.getFullYear();let n=new Date(y,5,25);if(n<=now)n=new Date(y+1,5,25);return Math.ceil((n-now)/86400000);}
document.getElementById('annDays').textContent='还有 '+nextAnn()+' 天';

// ── home: avatars ──
function setupAvatar(fileId,imgId,svgId,key){
  const img=document.getElementById(imgId),svg=document.getElementById(svgId);
  const saved=localStorage.getItem(key);
  if(saved){img.src=saved;img.style.display='block';svg.style.display='none';}
  document.getElementById(fileId).addEventListener('change',e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      img.src=ev.target.result;img.style.display='block';svg.style.display='none';
      try{localStorage.setItem(key,ev.target.result);}catch(err){}
      toast('头像已更新');
      updateChatAvatar();
    };r.readAsDataURL(f);
  });
}
setupAvatar('fileA','imgA','svgA','avatar_xiaoyan');
setupAvatar('fileB','imgB','svgB','avatar_xiaoli');

// ── home: background ──
function applyBgImg(url,name){
  document.body.style.backgroundImage=`url(${url})`;
  document.getElementById('bgImgName').textContent=name||'已设置背景图';
  document.getElementById('bgClearBtn').style.display='block';
  document.querySelectorAll('.color-dot').forEach(x=>x.classList.remove('active'));
}
function clearBgImg(){
  document.body.style.backgroundImage='';
  localStorage.removeItem('bg_img');localStorage.removeItem('bg_img_name');
  document.getElementById('bgImgName').textContent='点左边上传背景图片';
  document.getElementById('bgClearBtn').style.display='none';
  const c=localStorage.getItem('bg_theme')||'#FFF6F8';
  document.body.style.background=c;
  document.querySelectorAll('.color-dot').forEach(d=>{if(d.dataset.bg===c)d.classList.add('active');});
  toast('已恢复纯色背景');
}
const savedBgImg=localStorage.getItem('bg_img');
if(savedBgImg)applyBgImg(savedBgImg,localStorage.getItem('bg_img_name'));
document.getElementById('fileBg').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{localStorage.setItem('bg_img',ev.target.result);localStorage.setItem('bg_img_name',f.name);}catch(err){}
    applyBgImg(ev.target.result,f.name);toast('背景已更新');
  };r.readAsDataURL(f);
});
const themes=[{bg:'#FFF6F8',name:'樱花粉'},{bg:'#F0F4FF',name:'晴空蓝'},{bg:'#F0FFF4',name:'薄荷绿'},
  {bg:'#FFF8F0',name:'奶油橙'},{bg:'#F8F0FF',name:'薰衣紫'},{bg:'#FFFDF0',name:'柠檬黄'}];

const quotes=['人在最脆弱时打开的那扇门，反而是最真的。','焦虑是背景，爱是你在那个背景里做的选择。',
  '不是理性选择了你，是最难受的半夜哭着跑来找你——然后留下来了。',

document.getElementById('quoteBox').textContent=quotes[Math.floor(Math.random()*quotes.length)];

// ── chat ──
let serverUrl=localStorage.getItem('server_url')||'';
let serverToken=localStorage.getItem('server_token')||'xiaoli2026';
let lastTs='';
let pollTimer=null;
let unread=0;
let allMessages=[];

function getAv(role){
  if(role==='assistant'){
    const s=localStorage.getItem('avatar_xiaoyan');
    return s?`<img src="${s}">`:`<svg viewBox="0 0 36 36"><circle cx="18" cy="18" r="17" fill="#FFF0F3" stroke="#F0D4DA" stroke-width="0.5"/><ellipse cx="18" cy="21" rx="7" ry="8" fill="#FFE0C8"/><ellipse cx="18" cy="15" rx="7" ry="7" fill="#FFE0C8"/><ellipse cx="18" cy="11" rx="7" ry="6" fill="#E8E8E8"/><circle cx="15" cy="15" r="1.2" fill="#4A3040"/><circle cx="21" cy="15" r="1.2" fill="#4A3040"/></svg>`;
  }else{
    const s=localStorage.getItem('avatar_xiaoli');
    return s?`<img src="${s}">`:`<svg viewBox="0 0 36 36"><circle cx="18" cy="18" r="17" fill="#FFF0F3" stroke="#F0D4DA" stroke-width="0.5"/><ellipse cx="18" cy="21" rx="7" ry="8" fill="#FFE0C8"/><ellipse cx="18" cy="15" rx="7" ry="7" fill="#FFE0C8"/><ellipse cx="18" cy="11" rx="7" ry="6" fill="#2C2420"/><circle cx="15" cy="15" r="1.2" fill="#4A3040"/><circle cx="21" cy="15" r="1.2" fill="#4A3040"/></svg>`;
  }
}
function updateChatAvatar(){} // placeholder

function fmtTime(iso){
  const d=new Date(iso);
  return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
}
function fmtDate(iso){
  const d=new Date(iso);
  const today=new Date();today.setHours(0,0,0,0);
  const t=new Date(d);t.setHours(0,0,0,0);
  const diff=Math.floor((today-t)/86400000);
  if(diff===0)return'今天';if(diff===1)return'昨天';
  return`${d.getMonth()+1}月${d.getDate()}日`;
}

function renderMessages(msgs){
  const box=document.getElementById('chatMsgs');
  const tip=document.getElementById('emptyTip');
  if(!msgs.length){if(tip)tip.style.display='block';return;}
  if(tip)tip.style.display='none';
  let lastDate='';
  let html='';
  msgs.forEach(m=>{
    const d=new Date(m.ts).toDateString();
    if(d!==lastDate){
      html+=`<div class="date-sep"><span>${fmtDate(m.ts)}</span></div>`;
      lastDate=d;
    }
    const isUser=m.role==='user';
    html+=`<div class="msg-row ${m.role}">
      <div class="msg-av">${getAv(m.role)}</div>
      <div class="msg-body">
        <div class="bubble">${escHtml(m.content)}</div>
        <div class="msg-time">${fmtTime(m.ts)}</div>
      </div>
    </div>`;
  });
  box.innerHTML=html;
  box.scrollTop=box.scrollHeight;
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function setConn(ok){
  const dot=document.getElementById('connDot');
  const sub=document.getElementById('connSub');
  if(ok===null){dot.className='conn-dot';sub.textContent='未连接';}
  else if(ok){dot.className='conn-dot ok';sub.textContent='已连接';}
  else{dot.className='conn-dot err';sub.textContent='连接失败';}
}

async function poll(){
  if(!serverUrl)return;
  try{
    const url=`${serverUrl}/messages?token=${encodeURIComponent(serverToken)}${lastTs?'&since='+encodeURIComponent(lastTs):''}`;
    const r=await fetch(url,{headers:{'ngrok-skip-browser-warning':'1'}});
    if(!r.ok){setConn(false);return;}
    setConn(true);
    const msgs=await r.json();
    if(msgs.length){
      allMessages=[...allMessages,...msgs];
      if(lastTs)msgs.forEach(m=>{if(m.ts>lastTs)lastTs=m.ts;});
      else{allMessages=msgs;if(msgs.length)lastTs=msgs[msgs.length-1].ts;}
      renderMessages(allMessages);
      const isChat=document.getElementById('tabChat').classList.contains('active');
      if(!isChat){
        const newFromAi=msgs.filter(m=>m.role==='assistant').length;
        if(newFromAi>0){unread+=newFromAi;showBadge();}
      }
      document.getElementById('typingRow').style.display='none';
    }
    if(!lastTs&&allMessages.length)lastTs=allMessages[allMessages.length-1].ts;
  }catch(e){setConn(false);}
}

function startPolling(){
  if(!serverUrl)return;
  poll();
  if(!pollTimer)pollTimer=setInterval(poll,3000);
}
function stopPolling(){clearInterval(pollTimer);pollTimer=null;}
function showBadge(){
  const b=document.getElementById('unreadBadge');
  b.textContent=unread;b.style.display=unread>0?'block':'none';
}
function clearUnread(){
  unread=0;document.getElementById('unreadBadge').style.display='none';
}

async function sendMsg(){
  const input=document.getElementById('chatInput');
  const content=input.value.trim();
  if(!content||!serverUrl)return;
  const btn=document.getElementById('sendBtn');
  btn.disabled=true;input.value='';input.style.height='auto';
  // optimistic add
  const fakeTs=new Date().toISOString();
  allMessages.push({id:fakeTs,ts:fakeTs,role:'user',content,replied:false});
  renderMessages(allMessages);
  // show typing
  document.getElementById('typingRow').style.display='flex';
  document.getElementById('chatMsgs').scrollTop=document.getElementById('chatMsgs').scrollHeight;
  try{
    await fetch(`${serverUrl}/send?token=${encodeURIComponent(serverToken)}`,{
      method:'POST',headers:{'Content-Type':'application/json','ngrok-skip-browser-warning':'1'},
      body:JSON.stringify({content})
    });
  }catch(e){toast('发送失败，检查服务器连接');}
  btn.disabled=false;
}

function onKey(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}
}

// server url setup
if(serverUrl){
  document.getElementById('setupBar').style.display='none';
}
function saveServerUrl(){
  const v=document.getElementById('setupInput').value.trim().replace(/\/$/,'');
  if(!v)return;
  serverUrl=v;localStorage.setItem('server_url',v);
  document.getElementById('setupBar').style.display='none';
  toast('已保存');startPolling();
}

// settings modal
function openSettings(){
  document.getElementById('modalUrl').value=serverUrl;
  document.getElementById('modalToken').value=serverToken;
  document.getElementById('modalBg').classList.add('show');
}
function closeSettings(e){if(e.target===document.getElementById('modalBg'))document.getElementById('modalBg').classList.remove('show');}
function saveSettings(){
  const u=document.getElementById('modalUrl').value.trim().replace(/\/$/,'');
  const t=document.getElementById('modalToken').value.trim()||'xiaoli2026';
  serverUrl=u;serverToken=t;
  localStorage.setItem('server_url',u);localStorage.setItem('server_token',t);
  document.getElementById('modalBg').classList.remove('show');
  document.getElementById('setupBar').style.display=u?'none':'flex';
  allMessages=[];lastTs='';stopPolling();
  if(u)startPolling();
  toast('设置已保存');
}
// load existing messages on page load
async function loadAll(){
  if(!serverUrl)return;
  try{
    const r=await fetch(`${serverUrl}/messages?token=${encodeURIComponent(serverToken)}`,{headers:{'ngrok-skip-browser-warning':'1'}});
    if(!r.ok)return;setConn(true);
    allMessages=await r.json();
    if(allMessages.length)lastTs=allMessages[allMessages.length-1].ts;
    renderMessages(allMessages);
  }catch(e){setConn(false);}
}
loadAll();
